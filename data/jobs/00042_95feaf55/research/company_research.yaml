research: 'SoFi, short for Social Finance, Inc., was founded in 2011 by a group of
  Stanford business school students with the initial goal of providing affordable
  student loan refinancing. Headquartered in San Francisco, the company has since
  expanded into a broad financial services platform, offering products like personal
  loans, mortgages, investing, and banking through a digital-first approach. As a
  fintech leader, SoFi leverages technology to simplify financial services, making
  it a hub for innovation and engineering excellence. The company went public in 2021
  via a SPAC merger, marking a significant growth stage, and now serves millions of
  members, emphasizing scalability and cutting-edge tech solutions.


  SoFi’s mission is to help people achieve financial independence by providing tools
  and services to manage money effectively. Its core values include putting members
  first, embracing innovation, and fostering a collaborative environment—key aspects
  for tech and engineering roles where problem-solving and creativity are paramount.
  The company supports a hybrid and remote-friendly work culture, enabling engineers
  to work flexibly while contributing to impactful projects. SoFi’s culture emphasizes
  continuous learning and growth, encouraging employees to take ownership and drive
  technological advancements, which aligns with its focus on disrupting traditional
  finance through data-driven solutions and modern infrastructure.'
