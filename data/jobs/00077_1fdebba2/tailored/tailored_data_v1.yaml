job_summary: 'PwC is a global professional services firm seeking a Senior Manager
  for GenAI Python Systems Engineering in Fort Worth, TX. The role involves designing
  and building data infrastructure, developing AI-enhanced systems using Python and
  cloud technologies, and leading teams to solve complex data problems. Key requirements
  include strong proficiency in Python, SQL, and cloud platforms like AWS, Azure,
  and GCP, along with experience in AI techniques and data pipelines.

  '
responsibilities:
- Design and build robust data infrastructure for efficient data processing and analysis
- Develop and implement data pipelines, integration, and transformation solutions
- Lead teams through complex problems, providing coaching and fostering inclusive
  environments
- Validate outcomes with clients and act on feedback to ensure quality results
- Optimize cloud resources for cost, performance, and scalability while ensuring compliance
  with data governance and security policies
requirements:
- Strong proficiency in Python and experience with structured and unstructured data
- Strong proficiency in SQL and experience with relational databases
- Experience writing and maintaining FastAPI endpoints for scalable applications
- Strong understanding of AI techniques such as AI Agents and Retrieval-Augmented
  Generation
- Experience in prompt engineering for optimizing LLM outputs and knowledge of software
  development workflows
