job_summary: Ever-expanding technology like IoT, machine learning, and artificial
  intelligence means that there's more structured and unstructured data available
  today than ever before. As a data engineer, you know that organizing data can yield
  pivotal insights when it's gathered from disparate sources. We need a data professional
  like you to help our clients find answers in their data to impact important missions-from
  fraud detection to cancer research to national intelligence. As a Data Engineer
  at Booz Allen, you'll use your skills and experience to help build advanced technology
  solutions and implement data engineering activities on some of the most mission-driven
  projects in the industry. You'll develop and deploy the pipelines and platforms
  that organize and make disparate data meaningful. Here, you'll work with a multi-disciplinary
  team of analysts, data engineers, developers, and data consumers in a fast-paced,
  agile environment. You'll sharpen your skills in analytical exploration and data
  examination while you support the assessment, design, developing, and maintenance
  of scalable platforms for your clients. Work with us to use data for good. Join
  us. The world can't wait.
responsibilities:
- Help build advanced technology solutions and implement data engineering activities
- Develop and deploy the pipelines and platforms that organize and make disparate
  data meaningful
- Work with a multi-disciplinary team of analysts, data engineers, developers, and
  data consumers in a fast-paced, agile environment
- Support the assessment, design, developing, and maintenance of scalable platforms
  for clients
requirements:
- 2+ years of experience utilizing programming languages, including C++, Java, or
  Python
- Experience developing and maintaining scalable data stores that supply big data
  in forms needed for business analysis
- Experience creating software for retrieving, parsing, and processing structured
  and unstructured data
- Experience with developing scalable ETL or ELT workflows for reporting and analytics
- Experience creating solutions within a collaborative, cross-functional team environment
- Ability to develop scripts and programs for converting various types of data into
  usable formats and support project team to scale, monitor, and operate data platforms
- Ability to obtain and maintain a Public Trust or Suitability/Fitness determination
  based on client requirements
- Bachelor's degree
preferred:
- Experience in application development utilizing SQL or Scala
- Experience with a public cloud, including AWS, Microsoft Azure, or Google Cloud
- Experience with distributed data or computing tools, such as Spark, Databricks,
  Hadoop, Hive, AWS EMR, or Kafka
- Experience working on real-time data and streaming applications
- Experience with NoSQL implementation using MongoDB or Cassandra
- Experience with data warehousing, including AWS Redshift, MySQL, or Snowflake
- Experience with UNIX or Linux, including basic commands and Shell scripting
- Experience with Agile engineering practices
