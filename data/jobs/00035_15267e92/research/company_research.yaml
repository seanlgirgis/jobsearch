research: 'Government Tactical Solutions, LLC (GovTact) is a veteran-owned small business
  founded in 2010, headquartered in Vienna, Virginia, with a focus on delivering innovative
  technology and engineering solutions to federal government clients, including the
  Department of Defense and Intelligence Community. Over the past decade, GovTact
  has established itself as a trusted partner in providing mission-critical services
  such as software development, systems engineering, and cybersecurity, emphasizing
  cutting-edge solutions to address complex challenges.


  GovTact’s mission is to empower government missions through transformative technology,
  driven by core values of integrity, excellence, and commitment to client success.
  The company fosters a culture of innovation, encouraging employees to push technological
  boundaries while maintaining a collaborative and inclusive environment. For tech
  and engineering roles, GovTact offers opportunities to work on impactful projects,
  often with the flexibility of remote work, reflecting its adaptation to modern workforce
  needs. As a growing organization in the government contracting space, GovTact provides
  a dynamic environment for career development, balancing the stability of government
  contracts with the agility of a small business focused on technological advancement.'
