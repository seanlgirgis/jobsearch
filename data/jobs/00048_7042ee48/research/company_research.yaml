research: 'Kyndryl, established in 2021 as a spin-off from IBM''s Global Technology
  Services division, is a leading global provider of IT infrastructure services. Headquartered
  in New York City, the company focuses on helping enterprises design, build, manage,
  and modernize their complex IT systems, with a strong emphasis on hybrid cloud,
  data, and AI solutions. Kyndryl operates in over 60 countries, serving a diverse
  range of industries, and is positioned as a key player in digital transformation,
  making it an attractive environment for tech and engineering professionals seeking
  to work on cutting-edge projects at a large scale. As a relatively new entity, Kyndryl
  is in a growth stage, prioritizing innovation and agility to establish its independent
  identity in the tech services market.


  Kyndryl’s mission is to "design, build, manage, and modernize the mission-critical
  technology systems that the world depends on every day." Its core values—known as
  "The Kyndryl Way"—include being "Restless" (driving continuous improvement and innovation),
  "Empathetic" (focusing on customer and employee needs), and "Devoted" (committing
  to excellence and collaboration). These values foster a culture that encourages
  technical creativity and problem-solving, critical for engineering roles. The company
  supports flexible work arrangements, including remote and hybrid options, aligning
  with modern tech workforce expectations. Kyndryl also emphasizes learning and development,
  offering opportunities for engineers to grow through training and exposure to diverse,
  complex projects, reinforcing its commitment to innovation and professional advancement
  in a dynamic, evolving organization.'
