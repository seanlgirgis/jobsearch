company: Capital One
type: enterprise
research: 'Capital One, founded in 1988 by Richard Fairbank and Nigel Morris, began
  as a credit card company in Richmond, Virginia, and has grown into one of the largest
  banks in the United States, with a strong focus on technology-driven financial services.
  Initially pioneering the use of data analytics to personalize credit card offerings,
  the company has evolved into a leader in digital banking, leveraging technology
  to innovate across credit cards, auto loans, and banking products. This emphasis
  on tech innovation makes Capital One a significant player for tech and engineering
  professionals, as it invests heavily in areas like machine learning, cloud computing,
  and cybersecurity to enhance customer experiences and operational efficiency.


  Capital One’s mission is to “change banking for good” by bringing ingenuity, simplicity,
  and humanity to financial services, which aligns with its tech-forward approach.
  Its core values—Excellence and Do the Right Thing—guide its commitment to innovation
  and ethical practices, fostering a culture that encourages bold ideas and collaboration.
  For tech and engineering roles, Capital One is known for its supportive environment,
  offering remote and hybrid work options, extensive learning opportunities through
  platforms like Capital One University, and a focus on career growth in a mature
  yet innovative growth stage. The company’s culture emphasizes diversity, inclusion,
  and empowerment, creating a space where engineers can tackle complex challenges
  while contributing to transformative financial solutions.'
