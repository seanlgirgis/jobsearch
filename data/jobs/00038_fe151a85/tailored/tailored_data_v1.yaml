job_summary: 'As a Senior Data Engineer at McAfee, you will play a pivotal role in
  the data innovation team, designing and deploying scalable data architectures to
  unlock the potential of data assets. Based in Frisco, TX, this hybrid position involves
  building ETL/ELT pipelines, leveraging AI and machine learning, and ensuring data
  quality to drive business value. You will collaborate with stakeholders, data scientists,
  and product teams to create data-driven solutions. McAfee, a leader in personal
  security, offers a supportive and diverse work environment. Candidates must have
  5+ years of data engineering experience and be located in Texas.

  '
responsibilities:
- Collaborate with business stakeholders to define data needs and develop scalable
  technical solutions for operational efficiency and strategic insights.
- Lead initiatives to identify and leverage data assets for new business capabilities
  and competitive advantages.
- Design and deploy comprehensive data architectures to manage structured and unstructured
  data from diverse sources.
- Build robust ETL/ELT pipelines to channel data across cloud and local storage systems.
- Develop data quality frameworks with validation, monitoring, and recovery strategies
  to ensure accuracy and freshness.
- Implement automated data cleansing, enrichment, and structuring processes using
  AI, machine learning, and big data techniques.
- Create web-enabled solutions to democratize data access and support self-service
  analytics across the organization.
- Ensure secure and compliant data ingestion processes, particularly for sensitive
  data like PII.
- Maintain data integrity through proactive monitoring, alerting systems, and troubleshooting
  pipeline issues.
- Mentor junior team members and contribute to advancing the data engineering practice.
requirements:
- 5+ years of experience in developing ETL/ELT pipelines across varied data sources.
- Strong programming skills in Python, Scala, or Java with production-quality code
  capabilities.
- Experience with modern data platforms and tools such as Snowflake, Databricks, Apache
  Spark, Kafka, and Airflow.
- Knowledge of cloud platforms (AWS, Azure, GCP) and their native data services.
- Expertise in data integration, transformation, and curation with a focus on quality
  and consistency.
- Familiarity with containerization and orchestration technologies like Docker and
  Kubernetes.
- Experience with real-time data processing and streaming architectures.
- Commitment to SDLC best practices and structured development processes.
- Excellent communication and collaboration skills for working with technical and
  non-technical stakeholders.
- Ability to manage sensitive data, including PII, with attention to compliance and
  governance.
preferred:
- Background in data science or analytics for effective collaboration with data scientists.
- Experience in client-facing or Professional Services roles.
- Familiarity with DataOps and MLOps practices.
- Experience with Copilot and Claude Anthropic models for development and documentation.
- Practical knowledge of Model Context Protocol (MCP) for enterprise application integration.
