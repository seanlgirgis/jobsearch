company_name: Amazon.com LLC
company_website: https://www.amazon.jobs/
company_type: direct
job_title: Capacity Planning Specialist, Capacity Planning
location: Seattle, WA
job_summary: >
  Strategic workforce planning role focused on forecasting organizational demand,
  optimizing resource allocation, building KPI-driven staffing strategies,
  automation, and decision-support reporting for global teams.

responsibilities:
  - Build comprehensive workforce forecasting models
  - Analyze workforce and business data to optimize staffing strategies
  - Partner cross-functionally with global teams on hiring and resource planning
  - Create advanced visualizations and executive reporting
  - Automate workforce planning processes for speed and accuracy

requirements:
  - Bachelor's degree in analytics/business/engineering/mathematics or equivalent
  - 3+ years in analytical roles (workforce management, capacity planning, finance, business analysis)
  - KPI-driven analysis and decision support
  - Process improvement and automation experience
  - Financial modeling or P&L analysis exposure (preferred)

must_have_skills:
  - Capacity planning
  - Forecasting
  - KPI analysis
  - Data analysis
  - Process automation
  - Reporting and visualization
  - Cross-functional collaboration

nice_to_have_skills:
  - Workforce management analytics
  - Financial modeling
  - P&L analysis
  - Continuous improvement methodologies
  - Executive presentation and storytelling

