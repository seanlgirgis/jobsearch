company_name: Samsung Semiconductor
company_website: https://semiconductor.samsung.com/
company_type: direct
job_title: Capacity Planning Engineer
location: Taylor, TX
job_summary: >
  Capacity-planning engineering role focused on fab bottleneck analysis, line balance,
  supply chain forecasting, equipment efficiency, throughput optimization, and project execution.

responsibilities:
  - Perform long and short term capacity analysis on bottlenecks
  - Reduce capacity gaps through action plans and execution
  - Analyze line movement and supply chain forecasts
  - Investigate bottlenecks using production plans and tool metrics
  - Present risk summaries and capacity impacts to leadership
  - Coordinate with engineering/manufacturing for throughput improvements
  - Improve equipment efficiency and daily operation performance

requirements:
  - Engineering or applied mathematics degree
  - 5+ years in capacity planning/data analytics/production strategy
  - Factory Physics and supply chain management proficiency
  - Strong modeling and forecasting skills
  - SQL/Python/scripting for analytics and automation preferred

must_have_skills:
  - Capacity planning
  - Bottleneck analysis
  - Forecasting
  - Throughput optimization
  - Data analytics
  - Stakeholder risk communication
  - Process improvement execution

nice_to_have_skills:
  - Factory Physics
  - Supply chain forecasting
  - SQL
  - Python
  - Project management
  - Manufacturing engineering collaboration

