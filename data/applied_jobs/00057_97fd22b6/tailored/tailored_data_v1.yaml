  - capacity planning
  - forecasting
  - workload analysis
  - hybrid cloud infrastructure
  - internal tooling/APIs
  - data pipelines and analytics

nice_to_have_skills:
  - FinOps
  - quota/subscription management
  - telemetry systems
  - procurement strategy alignment
  - service ownership models

