job_title: Staff Engineer - Capacity Planning and Management
location: Dallas, TX (On-site)
job_summary: >
  Lead capacity engineering design for hybrid cloud/on-prem infrastructure through
  forecasting, workload analysis, quota/subscription strategy, and cross-functional
  planning with finance/procurement/platform teams.

responsibilities:
  - Build forecasting models and onboarding/expansion planning
  - Drive workload optimization and infrastructure efficiency
  - Build internal APIs/tools for capacity signals
  - Align capacity forecasts with finance and procurement
  - Define governance for allocation, scaling, and resilience

